<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Tank Reading</title>

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container" style="max-width: 800px; margin: 50px auto">
      <div class="card">
        <h1>Add Tank Reading</h1>

        <form id="readingForm">
          <label>Tank ID / Name</label>
          <select id="tankId" required>
            <option value="">Select Tank</option>
            <option value="LPG Tank 1">LPG Tank 1</option>
            <option value="LPG Tank 2">LPG Tank 2</option>
            <option value="LPG Tank 3">LPG Tank 3</option>
            <option value="LPG Tank 4">LPG Tank 4</option>
          </select>

          <label>Date & Time</label>
          <input type="datetime-local" id="readingDateTime" required />

          <label>LPG Level (%)</label>
          <input type="number" id="lpgLevel" min="0" max="100" required />

          <label>Pressure Unit</label>
          <select id="pressureUnit">
            <option value="psi">PSI</option>
            <option value="percent">Percent (%)</option>
          </select>

          <label>Pressure</label>
          <input type="number" id="pressure" required />

          <label>Temperature (Optional)</label>
          <input type="number" id="temperature" />

          <label>Remarks</label>
          <textarea id="remarks"></textarea>

          <button type="submit" class="btn">Submit Reading</button>
        </form>
      </div>
    </div>

    <script src="/add-reading.js"></script>
  </body>
</html>
